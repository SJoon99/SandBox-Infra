apiVersion: v1
kind: Service
metadata:
  name: pydio-minio
  namespace: pydio
spec:
  type: ExternalName
  externalName: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
  ports:
    - name: api
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pydio-s3-secret-sync
  namespace: pydio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pydio-s3-secret-sync
  namespace: pydio
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pydio-s3-secret-sync
  namespace: pydio
subjects:
  - kind: ServiceAccount
    name: pydio-s3-secret-sync
    namespace: pydio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pydio-s3-secret-sync
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pydio-s3-secret-sync
  namespace: pydio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: pydio-s3-secret-sync
      restartPolicy: OnFailure
      containers:
        - name: sync-secret
          image: bitnami/kubectl:1.33.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -euo pipefail
              for i in $(seq 1 60); do
                if kubectl get secret pydio-bucket -n pydio >/dev/null 2>&1; then
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "Timed out waiting for secret pydio-bucket"
                  exit 1
                fi
                sleep 5
              done

              ACCESS_KEY_B64="$(kubectl get secret pydio-bucket -n pydio -o jsonpath='{.data.AWS_ACCESS_KEY_ID}')"
              SECRET_KEY_B64="$(kubectl get secret pydio-bucket -n pydio -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}')"

              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: pydio-minio
                namespace: pydio
              type: Opaque
              data:
                root-user: ${ACCESS_KEY_B64}
                root-password: ${SECRET_KEY_B64}
              EOF
