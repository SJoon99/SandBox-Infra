annotations:
  category: Infrastructure
apiVersion: v2
appVersion: v4
dependencies:
- condition: mariadb.enabled
  name: mariadb
  repository: https://charts.bitnami.com/bitnami
  version: 20.5.5
- condition: mariadb-galera.enabled
  name: mariadb-galera
  repository: https://charts.bitnami.com/bitnami
  version: 14.2.9
- condition: redis.enabled
  name: redis
  repository: https://charts.bitnami.com/bitnami
  version: 21.x.x
- condition: nats.enabled
  name: nats
  repository: https://charts.bitnami.com/bitnami
  version: 9.0.17
- condition: mongodb.enabled
  name: mongodb
  repository: https://charts.bitnami.com/bitnami
  version: 16.5.23
- condition: etcd.enabled
  name: etcd
  repository: https://charts.bitnami.com/bitnami
  version: 11.3.x
- condition: minio.enabled
  name: minio
  repository: https://charts.bitnami.com/bitnami
  version: 17.0.6
- condition: ingress.enabled
  name: ingress-nginx
  repository: https://kubernetes.github.io/ingress-nginx
  version: 4.12.3
- condition: vault.enabled
  name: vault
  repository: https://helm.releases.hashicorp.com
  version: x.x.x
- condition: tls.enabled
  name: cert-manager
  repository: https://charts.jetstack.io
  version: x.x.x
description: A Helm chart for Kubernetes
home: https://pydio.com
icon: https://pydio.com/sites/all/themes/pydio_theme/images/logoPydioWhite.png
keywords:
- pydio
- cells
- storage
- object-storage
- s3
- cluster
maintainers:
- name: Pydio
  url: https://github.com/pydio/cells/tools/kubernetes
name: cells
sources:
- https://github.com/pydio/cells
type: application
version: 0.1.3
