# -- Default values for llmstack helm chart
# -- Declare variables to be passed into your templates.

# -- Serving engine configuratoon
servingEngineSpec:
  enableEngine: true
  runtimeClassName: "nvidia"
  # -- Customized labels for the serving engine deployment
  labels:
    environment: "test"
    release: "test"
  # -- Extra service ports for models
  extraPorts: []
  # vllmApiKey: (optional) api key for securing the vLLM models. Can be either:
  #   - A string containing the token directly (will be stored in a generated secret)
  #   - An object referencing an existing secret:
  #     secretName: "my-existing-secret"
  #     secretKey: "vllm-api-key"
  #
  modelSpec:
    - name: "gemma-27b-awq"
      repository: "vllm/vllm-openai"
      tag: "latest"
      modelURL: "/data/model" # 모델이 저장될 내부 경로
      
      replicaCount: 1
      requestCPU: 8
      requestMemory: "32Gi"
      requestGPU: 2            # Titan V 2개 할당
      
      # 1. 모델을 담을 바구니 (PVC) 자동 생성
      pvcStorage: "100Gi"
      # storageClass: "ceph-block" # kubectl get sc에서 확인한 이름을 적으세요. 안 적으면 기본값 사용.
      shmSize: "16Gi"          # GPU 간 통신(NCCL)을 위한 공유 메모리

      # 2. 허깅페이스 토큰 직접 입력
      env:
        - name: HF_TOKEN
          value: "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" 

      # 3. 모델 다운로드 로직 (S3를 거치지 않고 직접 다운로드)
      initContainer:
        - name: "direct-model-download"
          image: "huggingface/transformers-pytorch-gpu:latest" # 다운로드 도구가 포함된 이미지
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install huggingface_hub
              python3 -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='mixedbread-ai/gemma-2-27b-it-awq', local_dir='/data/model', token='${HF_TOKEN}')"
          mountPvcStorage: true

      # 4. vLLM 엔진 최적화 (Titan V 2개용)
      vllmConfig:
        tensorParallelSize: 2
        dtype: "float16"
        gpuMemoryUtilization: 0.90
        maxModelLen: 8192
        extraArgs: 
          - "--quantization"
          - "awq"
          - "--trust-remote-code"
          - "--enforce-eager" # Titan V 안정성 확보

      # 5. GPU 서버 지정
      nodeName: "titan-v-server"
  #
  # Example:
  # vllmApiKey: "vllm_xxxxxxxxxxxxx"
  # modelSpec:
